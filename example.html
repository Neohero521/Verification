<div class="novel-writer-extension-root" aria-label="小说智能续写系统">
    <!-- 可移动悬浮球（保持不变） -->
    <div id="novel-writer-float-ball" 
         class="float-ball" 
         role="button" 
         tabindex="0"
         aria-label="打开小说续写系统面板"
         style="visibility: hidden; opacity: 0;">
        <div class="ball-inner" role="presentation" aria-hidden="true">
            <div class="ball-icon">📖</div>
            <div class="ball-glow" role="presentation" aria-hidden="true"></div>
        </div>
        <div class="ball-pulse" role="presentation" aria-hidden="true"></div>
    </div>

    <!-- 主功能面板 -->
    <div id="novel-writer-panel" 
         class="writer-panel simplified-layout" 
         role="dialog" 
         aria-modal="true" 
         aria-labelledby="panel-title"
         aria-describedby="panel-description">
        <!-- 面板头部 -->
        <div class="panel-header-simple">
            <div class="header-left">
                <span class="header-icon">📖</span>
                <h2 id="panel-title">小说续写系统</h2>
            </div>
            <button id="panel-close-btn" class="close-btn" aria-label="关闭">
                <span>✕</span>
            </button>
        </div>

        <!-- 小说详情模态框 -->
        <div id="novel-detail-modal" class="modal-overlay" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="modal-novel-title">小说详情</h3>
                    <button class="modal-close-btn" id="close-novel-detail-modal">✕</button>
                </div>
                <div class="modal-body" id="modal-novel-body"></div>
                <div class="modal-footer">
                    <button class="btn btn-primary" id="modal-load-novel-btn">加载此小说</button>
                    <button class="btn btn-secondary" id="modal-close-novel-btn">关闭</button>
                </div>
            </div>
        </div>

        <!-- 标签管理模态框 -->
        <div id="tag-manage-modal" class="modal-overlay" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>🏷️ 管理标签</h3>
                    <button class="modal-close-btn" id="close-tag-manage-modal">✕</button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label>添加新标签</label>
                        <div class="input-with-button">
                            <input type="text" id="new-tag-input" class="form-input" placeholder="输入标签名称">
                            <button class="btn btn-primary btn-sm" id="add-tag-btn">添加</button>
                        </div>
                    </div>
                    <div id="tag-manage-list" class="tag-list"></div>
                </div>
            </div>
        </div>

        <!-- 主布局容器 -->
        <div class="main-container">
            <!-- 左侧边栏 -->
            <aside class="sidebar">
                <!-- 当前小说信息卡片 -->
                <div id="current-novel-card" class="novel-card" style="display: none;">
                    <div class="novel-card-header">
                        <span class="novel-icon">📖</span>
                        <span id="current-novel-name" class="novel-name">-</span>
                    </div>
                    <div class="novel-stats">
                        <span id="current-chapter-count">0 章节</span>
                        <span class="stat-divider">·</span>
                        <span id="current-graph-status">图谱待生成</span>
                    </div>
                    <button class="btn btn-sm btn-outline btn-block" id="back-to-bookshelf">
                        ↩️ 返回书架
                    </button>
                </div>

                <!-- 导航菜单 -->
                <nav class="nav-menu">
                    <div class="nav-item active" data-phase="1">
                        <span class="nav-icon">📚</span>
                        <span class="nav-label">书架</span>
                    </div>
                    <div class="nav-item" data-phase="2" aria-disabled="true">
                        <span class="nav-icon">📝</span>
                        <span class="nav-label">编辑</span>
                    </div>
                    <div class="nav-item" data-phase="3" aria-disabled="true">
                        <span class="nav-icon">✨</span>
                        <span class="nav-label">续写</span>
                    </div>
                </nav>
            </aside>

            <!-- 主内容区 -->
            <main class="content">
                <!-- 阶段1：书架 -->
                <div class="phase" id="phase-1">
                    <div class="bookshelf-phase">
                        <!-- 搜索和工具栏 -->
                        <div class="bookshelf-toolbar">
                            <input type="text" 
                                   id="bookshelf-search-input"
                                   class="form-input"
                                   placeholder="🔍 搜索小说..."
                                   aria-label="搜索小说">
                            <div class="toolbar-actions">
                                <button class="btn btn-sm btn-outline" id="bookshelf-manage-tags-btn" title="标签">🏷️</button>
                                <button class="btn btn-sm btn-outline" id="bookshelf-view-toggle-btn" title="切换视图">📋</button>
                                <select id="bookshelf-sort-select" class="form-select form-select-sm">
                                    <option value="updatedAt">最新</option>
                                    <option value="createdAt">创建</option>
                                    <option value="name">名称</option>
                                </select>
                            </div>
                        </div>

                        <!-- 标签筛选 -->
                        <div id="bookshelf-tag-filter" class="tag-filter"></div>

                        <!-- 上传区域 -->
                        <div class="upload-area-compact">
                            <div class="upload-zone-compact" id="bookshelf-upload-zone">
                                <input id="bookshelf-novel-file-upload" type="file" accept=".txt" style="display: none;">
                                <div id="bookshelf-select-file-btn" class="upload-trigger" role="button" tabindex="0">
                                    <span class="upload-icon">📂</span>
                                    <span class="upload-text">点击上传小说</span>
                                </div>
                            </div>
                            <div class="upload-controls-compact">
                                <input id="bookshelf-chapter-regex-input" 
                                       type="text" 
                                       class="form-input regex-input-compact"
                                       value="第.+章"
                                       aria-label="章节正则">
                                <button class="btn btn-sm btn-primary" id="bookshelf-parse-and-save-btn">✨ 解析</button>
                            </div>
                        </div>

                        <!-- 选择操作栏 -->
                        <div id="selection-controls" class="selection-bar" style="display: none;">
                            <span id="selected-count">已选 0 本</span>
                            <button class="btn btn-sm btn-secondary" id="batch-export-btn">📤</button>
                            <button class="btn btn-sm btn-danger" id="batch-delete-btn">🗑️</button>
                            <button class="btn btn-sm" id="cancel-selection-btn">✕</button>
                        </div>

                        <!-- 书架列表 -->
                        <div class="bookshelf-list">
                            <div class="list-header">
                                <h4 id="bookshelf-count-display">共 0 本小说</h4>
                            </div>
                            <div id="bookshelf-container" class="books-grid" aria-label="书架列表">
                                <div class="empty-state">
                                    <span class="empty-icon">📚</span>
                                    <p>书架为空，开始上传你的第一本小说吧</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 阶段2：编辑 -->
                <div class="phase" id="phase-2" style="display: none;">
                    <div class="phase-header">
                        <h3>📝 编辑与图谱</h3>
                        <div class="header-actions">
                            <button class="btn btn-sm btn-primary" id="phase2-save-btn">💾 保存</button>
                            <button class="btn btn-sm" id="phase2-export-btn">📤</button>
                        </div>
                    </div>

                    <!-- 子导航 -->
                    <div class="sub-nav">
                        <button class="sub-nav-btn active" data-subtab="chapters">📖 章节</button>
                        <button class="sub-nav-btn" data-subtab="graphs">🧠 图谱</button>
                        <button class="sub-nav-btn" data-subtab="reader">📚 阅读</button>
                    </div>

                    <!-- 章节子页面 -->
                    <div class="sub-content active" id="subtab-chapters">
                        <div class="chapter-management">
                            <div class="chapter-toolbar-compact">
                                <div class="toolbar-left">
                                    <button class="btn btn-sm btn-outline" id="select-all-chapters-btn" title="全选">☑️</button>
                                    <span id="chapter-count-display">0 个章节</span>
                                </div>
                                <div class="toolbar-right">
                                    <button class="btn btn-sm btn-outline" id="validate-chapter-graph-btn">🔍</button>
                                    <button class="btn btn-sm btn-primary" id="import-selected-btn">导入</button>
                                </div>
                            </div>
                            <div class="progress-wrapper compact" id="novel-import-progress-wrapper" style="display: none;">
                                <div class="progress-bar" id="novel-import-progress-bar">
                                    <div class="progress-fill" id="novel-import-progress"></div>
                                </div>
                                <span id="novel-import-status" class="progress-text"></span>
                            </div>
                            <div id="novel-chapter-list" class="chapter-list compact-list">
                                <div class="empty-state">
                                    <span class="empty-icon">📁</span>
                                    <p>请先从书架加载小说</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 图谱子页面 -->
                    <div class="sub-content" id="subtab-graphs" style="display: none;">
                        <div class="graph-workspace">
                            <!-- 图谱生成与合并 -->
                            <div class="card compact-card">
                                <div class="card-header-compact">
                                    <span class="card-title-icon">🗺️</span>
                                    <span>图谱管理</span>
                                </div>
                                <div class="card-body-compact">
                                    <div class="graph-actions-row">
                                        <div class="action-group">
                                            <button class="btn btn-sm btn-primary" id="graph-single-btn">✨ 单章生成</button>
                                            <button class="btn btn-sm" id="graph-batch-btn">🚀 批量生成</button>
                                        </div>
                                        <div class="graph-stats-inline">
                                            <span class="stat-badge">图谱: <strong id="total-graphs-count">0</strong></span>
                                            <span class="stat-badge">批次: <strong id="batch-count-display">0</strong></span>
                                        </div>
                                        <div class="action-group">
                                            <input id="chapter-graph-file-upload" type="file" accept=".json" style="display: none;">
                                            <button class="btn btn-sm btn-outline" id="chapter-graph-import-btn">📥</button>
                                            <button class="btn btn-sm btn-outline" id="chapter-graph-export-btn">📤</button>
                                        </div>
                                    </div>
                                    <div class="progress-wrapper compact">
                                        <div class="progress-bar progress-animated" id="graph-progress-bar">
                                            <div class="progress-fill" id="graph-progress"></div>
                                        </div>
                                        <span id="graph-generate-status" class="progress-text"></span>
                                    </div>
                                </div>
                            </div>

                            <!-- 图谱合并 -->
                            <div class="card compact-card">
                                <div class="card-header-compact">
                                    <span class="card-title-icon">📦</span>
                                    <span>合并图谱</span>
                                </div>
                                <div class="card-body-compact">
                                    <div class="merge-row">
                                        <div class="form-group-inline">
                                            <label>每批</label>
                                            <input id="batch-merge-count" type="number" class="form-input form-input-sm" value="50" min="10" max="100">
                                            <label>章</label>
                                        </div>
                                        <div class="action-group">
                                            <button class="btn btn-sm btn-primary" id="graph-batch-merge-btn">🔄 分批合并</button>
                                            <button class="btn btn-sm" id="graph-merge-btn">📋 整体合并</button>
                                            <button class="btn btn-sm btn-danger" id="graph-batch-clear-btn">🗑️</button>
                                        </div>
                                    </div>
                                    <div class="progress-wrapper compact">
                                        <div class="progress-bar progress-animated" id="batch-merge-progress-bar">
                                            <div class="progress-fill" id="batch-merge-progress"></div>
                                        </div>
                                        <span id="batch-merge-status" class="progress-text"></span>
                                    </div>
                                </div>
                            </div>

                            <!-- 合并结果 -->
                            <div class="card compact-card">
                                <div class="card-header-compact">
                                    <span class="card-title-icon">&lt;/&gt;</span>
                                    <span>合并结果</span>
                                    <span class="meta" id="graph-size-display">0 KB</span>
                                </div>
                                <div class="card-body-compact">
                                    <textarea id="merged-graph-preview" 
                                              rows="6" 
                                              class="form-textarea code-editor compact-textarea" 
                                              readonly 
                                              placeholder="合并后的图谱将显示在这里..."></textarea>
                                    <div class="result-actions">
                                        <button class="btn btn-sm btn-outline" id="graph-validate-btn">✓ 校验</button>
                                        <button class="btn btn-sm" id="graph-copy-btn">📋</button>
                                        <button class="btn btn-sm" id="graph-export-btn">💾</button>
                                        <button class="btn btn-sm btn-danger" id="graph-clear-btn">🗑️</button>
                                    </div>
                                </div>
                            </div>

                            <!-- 校验结果 -->
                            <div class="card compact-card" id="graph-validate-result" style="display: none;">
                                <div class="card-header-compact">
                                    <span class="card-title-icon">🛡️</span>
                                    <span>校验结果</span>
                                </div>
                                <div class="card-body-compact">
                                    <textarea id="graph-validate-content" 
                                              rows="3" 
                                              class="form-textarea compact-textarea" 
                                              readonly></textarea>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 阅读器子页面 -->
                    <div class="sub-content" id="subtab-reader" style="display: none;">
                        <div class="reader compact-reader">
                            <div class="reader-header">
                                <div class="reader-title">
                                    <span id="reader-current-chapter-title">未选择章节</span>
                                    <span id="reader-chapter-count" class="meta">0/0</span>
                                </div>
                                <div class="reader-controls">
                                    <button class="btn btn-sm btn-icon" id="reader-font-minus">A-</button>
                                    <span id="font-size-display">16</span>
                                    <button class="btn btn-sm btn-icon" id="reader-font-plus">A+</button>
                                    <button class="btn btn-sm" id="reader-chapter-select-btn">📋</button>
                                </div>
                            </div>
                            <div class="reader-body">
                                <div id="reader-content" class="reader-content">
                                    <div class="empty-state">
                                        <span class="empty-icon">📚</span>
                                        <p>请先加载小说并解析章节</p>
                                    </div>
                                </div>
                            </div>
                            <div class="reader-footer compact-footer">
                                <button class="btn btn-sm btn-outline" id="reader-prev-chapter">◀</button>
                                <div class="reader-progress-wrapper">
                                    <span id="reader-progress-text">0%</span>
                                    <div class="progress-bar" style="width: 100px;">
                                        <div class="progress-fill" id="reader-progress-fill"></div>
                                    </div>
                                </div>
                                <button class="btn btn-sm btn-outline" id="reader-next-chapter">▶</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 阶段3：续写 -->
                <div class="phase" id="phase-3" style="display: none;">
                    <div class="write-section">
                        <!-- 续写基准 -->
                        <div class="card compact-card">
                            <div class="card-header-compact">
                                <span class="card-title-icon">🔖</span>
                                <span>续写基准</span>
                            </div>
                            <div class="card-body-compact">
                                <select id="write-chapter-select" class="form-select">
                                    <option value="">请选择章节</option>
                                </select>
                                <textarea id="write-chapter-content" 
                                          rows="4" 
                                          class="form-textarea compact-textarea" 
                                          readonly 
                                          placeholder="选择章节后内容将显示在这里..."></textarea>
                                <button class="btn btn-sm btn-outline" id="graph-update-modified-btn">🔄 更新图谱</button>
                            </div>
                        </div>

                        <!-- 续写校验 -->
                        <div class="card compact-card" id="drawer-precheck">
                            <div class="drawer-toggle">
                                <span>🎯 续写校验</span>
                                <span id="precheck-status" class="status">未执行</span>
                                <span class="arrow">▼</span>
                            </div>
                            <div class="drawer-content">
                                <button class="btn btn-sm btn-primary" id="precheck-run-btn">⚡ 执行校验</button>
                                <textarea id="precheck-report" 
                                          rows="3" 
                                          class="form-textarea compact-textarea" 
                                          readonly 
                                          placeholder="校验报告将显示在这里..."></textarea>
                            </div>
                        </div>

                        <!-- 续写配置 -->
                        <div class="card compact-card">
                            <div class="card-header-compact">
                                <span class="card-title-icon">⚡</span>
                                <span>续写配置</span>
                            </div>
                            <div class="card-body-compact">
                                <div class="config-row">
                                    <div class="form-group-inline">
                                        <label>字数</label>
                                        <input id="write-word-count" type="number" class="form-input form-input-sm" value="2000" min="500" max="10000">
                                    </div>
                                    <div class="toggle-group">
                                        <label>质量校验</label>
                                        <div class="toggle-switch" id="quality-check-switch">
                                            <input type="checkbox" checked class="sr-only">
                                            <span class="toggle-slider"></span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- 生成按钮 -->
                        <div class="card compact-card generate-card">
                            <div class="generate-buttons">
                                <button class="btn btn-primary" id="write-generate-btn">✨ 生成续写</button>
                                <button class="btn btn-danger" id="write-stop-btn" disabled>⏹️ 停止</button>
                            </div>
                            <div class="progress-wrapper compact">
                                <span id="write-status" class="progress-text"></span>
                            </div>
                            <div id="quality-result-block" class="quality-result" style="display: none;">
                                <div class="score-display">
                                    <div class="score-circle">
                                        <svg viewBox="0 0 100 100">
                                            <circle class="score-bg" cx="50" cy="50" r="45"></circle>
                                            <circle class="score-fill" cx="50" cy="50" r="45" id="quality-score-circle"></circle>
                                        </svg>
                                        <span id="quality-score">0</span>
                                    </div>
                                    <span class="score-label">质量评分</span>
                                </div>
                                <textarea id="quality-report" 
                                          rows="2" 
                                          class="form-textarea compact-textarea" 
                                          readonly></textarea>
                            </div>
                        </div>

                        <!-- 续写结果 -->
                        <div class="card compact-card">
                            <div class="card-header-compact">
                                <span class="card-title-icon">📝</span>
                                <span>续写结果</span>
                                <span class="meta" id="result-word-count">0 字</span>
                            </div>
                            <div class="card-body-compact">
                                <textarea id="write-content-preview" 
                                          rows="6" 
                                          class="form-textarea compact-textarea" 
                                          placeholder="生成的续写内容将显示在这里..."></textarea>
                                <div class="result-actions">
                                    <button class="btn btn-sm" id="write-copy-btn">📋</button>
                                    <button class="btn btn-sm btn-primary" id="write-send-btn">📤</button>
                                    <button class="btn btn-sm btn-danger" id="write-clear-btn">🗑️</button>
                                </div>
                            </div>
                        </div>

                        <!-- 续写链条 -->
                        <div class="card compact-card">
                            <div class="card-header-compact">
                                <span class="card-title-icon">🔗</span>
                                <span>续写链条</span>
                                <button class="btn btn-sm btn-danger" id="clear-chain-btn">🗑️</button>
                            </div>
                            <div class="card-body-compact">
                                <div id="continue-write-chain" class="chain-list">
                                    <div class="empty-state">
                                        <span class="empty-icon">📝</span>
                                        <p>暂无续写章节</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
</div>
