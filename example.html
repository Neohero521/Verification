<div id="example_extension_settings" style="display: none;" class="example-settings">
    <style>
        @import url('{{resource}}/style.css?{{version}}');
    </style>
    <div class="example-extension-content">
        <!-- 顶部工具栏 -->
        <div class="st-top-bar">
            <div class="st-current-novel-info" id="st-current-novel-info">
                <span class="st-no-novel-text">请从书架选择或上传小说</span>
            </div>
            <div class="st-top-actions">
                <button class="menu_button" id="st-back-to-bookshelf-btn" style="display: none;">
                    <i class="fa fa-arrow-left"></i> 返回到书架
                </button>
                <button class="menu_button" id="st-extension-settings-btn">
                    <i class="fa fa-cog"></i> 设置
                </button>
            </div>
        </div>

        <!-- 主容器 -->
        <div class="st-main-container">
            <!-- 左侧导航 -->
            <div class="st-left-sidebar">
                <div class="st-nav-item active" data-phase="bookshelf">
                    <i class="fa fa-book"></i>
                    <span>书架与上传</span>
                </div>
                <div class="st-nav-item" data-phase="editor" id="st-nav-editor" style="display: none;">
                    <i class="fa fa-edit"></i>
                    <span>编辑与图谱</span>
                </div>
                <div class="st-nav-item" data-phase="writing" id="st-nav-writing" style="display: none;">
                    <i class="fa fa-magic"></i>
                    <span>续写与发布</span>
                </div>
            </div>

            <!-- 右侧主内容 -->
            <div class="st-right-content">
                <!-- 阶段1: 书架 -->
                <div class="st-phase-content active" id="st-phase-bookshelf">
                    <div class="st-bookshelf-header">
                        <div class="st-search-box">
                            <input type="text" id="st-bookshelf-search" placeholder="搜索小说...">
                            <i class="fa fa-search"></i>
                        </div>
                        <div class="st-tag-filter" id="st-tag-filter">
                            <span class="st-filter-tag active" data-tag="">全部</span>
                        </div>
                    </div>
                    
                    <div class="st-view-toggle">
                        <button class="menu_button active" id="st-grid-view-btn">
                            <i class="fa fa-th"></i> 网格
                        </button>
                        <button class="menu_button" id="st-list-view-btn">
                            <i class="fa fa-list"></i> 列表
                        </button>
                    </div>

                    <div class="st-bookshelf-grid" id="st-bookshelf-container"></div>

                    <div class="st-bookshelf-actions">
                        <button class="menu_button" id="st-upload-novel-btn">
                            <i class="fa fa-upload"></i> 上传新小说
                        </button>
                        <button class="menu_button" id="st-import-novel-btn">
                            <i class="fa fa-download"></i> 导入小说
                        </button>
                        <input type="file" id="st-upload-file-input" accept=".txt" style="display: none;">
                        <input type="file" id="st-import-file-input" accept=".json" style="display: none;">
                    </div>
                </div>

                <!-- 阶段2: 编辑与图谱 -->
                <div class="st-phase-content" id="st-phase-editor">
                    <div class="st-editor-layout">
                        <div class="st-chapter-sidebar">
                            <div class="st-chapter-search">
                                <input type="text" id="st-chapter-search-input" placeholder="搜索章节...">
                            </div>
                            <div class="st-chapter-list" id="st-chapter-list-container"></div>
                        </div>

                        <div class="st-editor-main">
                            <div class="st-editor-tabs">
                                <div class="st-editor-tab active" data-tab="chapter">章节内容</div>
                                <div class="st-editor-tab" data-tab="graph">知识图谱</div>
                            </div>

                            <!-- 章节内容标签页 -->
                            <div class="st-tab-content active" id="st-tab-chapter">
                                <div class="st-chapter-header">
                                    <h3 id="st-current-chapter-title">请选择章节</h3>
                                    <div class="st-chapter-actions">
                                        <button class="menu_button" id="st-generate-graph-btn">
                                            <i class="fa fa-brain"></i> 生成图谱
                                        </button>
                                        <button class="menu_button" id="st-edit-chapter-btn">
                                            <i class="fa fa-edit"></i> 修改章节
                                        </button>
                                    </div>
                                </div>
                                <div class="st-chapter-content" id="st-chapter-content-display"></div>
                            </div>

                            <!-- 图谱标签页 -->
                            <div class="st-tab-content" id="st-tab-graph">
                                <div class="st-graph-management">
                                    <div class="st-graph-status">
                                        <span id="st-graph-progress">已生成：0/0章</span>
                                        <div class="st-progress-bar">
                                            <div class="st-progress-fill" id="st-graph-progress-fill" style="width: 0%"></div>
                                        </div>
                                    </div>

                                    <div class="st-graph-actions">
                                        <button class="menu_button" id="st-batch-generate-graphs-btn">
                                            <i class="fa fa-sync-alt"></i> 批量生成图谱
                                        </button>
                                        <button class="menu_button" id="st-export-graphs-btn">
                                            <i class="fa fa-download"></i> 导出图谱
                                        </button>
                                    </div>

                                    <div class="st-merge-graph-section">
                                        <h4><i class="fa fa-puzzle-piece"></i> 合并图谱</h4>
                                        <div class="st-merge-graph-actions">
                                            <button class="menu_button" id="st-merge-graphs-btn">
                                                <i class="fa fa-sync-alt"></i> 合并图谱
                                            </button>
                                            <button class="menu_button" id="st-validate-graph-btn">
                                                <i class="fa fa-check"></i> 验证
                                            </button>
                                            <button class="menu_button" id="st-export-merged-graph-btn">
                                                <i class="fa fa-download"></i> 导出
                                            </button>
                                            <button class="menu_button" id="st-clear-merged-graph-btn">
                                                <i class="fa fa-trash"></i> 清空
                                            </button>
                                        </div>
                                        <div class="st-merged-graph-preview">
                                            <textarea id="st-merged-graph-preview" placeholder="合并后的图谱将显示在这里..."></textarea>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 阶段3: 续写与发布 -->
                <div class="st-phase-content" id="st-phase-writing">
                    <div class="st-writing-section">
                        <div class="st-writing-settings">
                            <div class="st-setting-row">
                                <label>选择章节：</label>
                                <select id="st-continue-chapter-select"></select>
                            </div>
                            <div class="st-setting-row">
                                <label>续写字数：</label>
                                <input type="number" id="st-continue-length-input" value="1000" min="100" max="10000">
                            </div>
                            <div class="st-setting-row">
                                <label><input type="checkbox" id="st-quality-check-toggle" checked> 启用质量检查</label>
                            </div>
                            <div class="st-writing-actions">
                                <button class="menu_button" id="st-generate-continue-btn">
                                    <i class="fa fa-magic"></i> 生成续写
                                </button>
                                <button class="menu_button" id="st-stop-generate-btn" style="display: none;">
                                    <i class="fa fa-stop"></i> 停止
                                </button>
                            </div>
                        </div>

                        <div class="st-continue-result">
                            <div class="st-result-header">
                                <h4>续写结果</h4>
                                <div id="st-quality-score"></div>
                            </div>
                            <div class="st-result-content" id="st-continue-result-content">
                                <div class="st-empty-state">点击"生成续写"开始</div>
                            </div>
                            <div class="st-result-actions">
                                <button class="menu_button" id="st-copy-result-btn">
                                    <i class="fa fa-copy"></i> 复制
                                </button>
                                <button class="menu_button" id="st-save-as-chapter-btn">
                                    <i class="fa fa-book"></i> 保存为新章节
                                </button>
                                <button class="menu_button" id="st-regenerate-btn">
                                    <i class="fa fa-sync-alt"></i> 重新生成
                                </button>
                            </div>
                        </div>

                        <div class="st-continue-history">
                            <h4>续写历史</h4>
                            <div class="st-history-list" id="st-continue-history-list">
                                <div class="st-empty-state">暂无历史记录</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 上传小说模态框 -->
    <div class="st-modal-overlay" id="st-upload-modal" style="display: none;">
        <div class="st-modal">
            <div class="st-modal-header">
                <h3>📤 上传新小说</h3>
                <button class="st-modal-close" id="st-close-upload-modal">
                    <i class="fa fa-times"></i>
                </button>
            </div>
            <div class="st-modal-body">
                <div class="st-drop-zone" id="st-drop-zone">
                    <i class="fa fa-cloud-upload"></i>
                    <p>拖拽TXT文件到这里</p>
                    <p>或</p>
                    <button class="menu_button" id="st-select-file-btn">选择文件</button>
                </div>
                <div class="st-file-info" id="st-file-info" style="display: none;">
                    <p><strong>文件名：</strong><span id="st-selected-filename"></span></p>
                </div>
                <div class="st-upload-settings">
                    <label>小说名称：</label>
                    <input type="text" id="st-novel-name-input" placeholder="自动从文件名提取">
                    <label>章节正则：</label>
                    <input type="text" id="st-chapter-regex-input" value="^\\s*第.*[章卷节]">
                </div>
            </div>
            <div class="st-modal-footer">
                <button class="menu_button" id="st-cancel-upload-btn">取消</button>
                <button class="menu_button" id="st-parse-upload-btn">
                    <i class="fa fa-rocket"></i> 解析并添加到书架
                </button>
            </div>
        </div>
    </div>

    <!-- 小说详情模态框 -->
    <div class="st-modal-overlay" id="st-detail-modal" style="display: none;">
        <div class="st-modal st-detail-modal">
            <div class="st-modal-header">
                <h3 id="st-detail-title">小说详情</h3>
                <button class="st-modal-close" id="st-close-detail-modal">
                    <i class="fa fa-times"></i>
                </button>
            </div>
            <div class="st-modal-body" id="st-detail-content"></div>
            <div class="st-modal-footer">
                <button class="menu_button" id="st-detail-edit-btn">
                    <i class="fa fa-edit"></i> 打开编辑
                </button>
                <button class="menu_button" id="st-detail-export-btn">
                    <i class="fa fa-download"></i> 导出
                </button>
            </div>
        </div>
    </div>

    <!-- 设置模态框 -->
    <div class="st-modal-overlay" id="st-settings-modal" style="display: none;">
        <div class="st-modal st-settings-modal">
            <div class="st-modal-header">
                <h3>⚙️ 扩展设置</h3>
                <button class="st-modal-close" id="st-close-settings-modal">
                    <i class="fa fa-times"></i>
                </button>
            </div>
            <div class="st-modal-body">
                <div class="form-group">
                    <label for="novel_name" class="form_label">小说名称</label>
                    <input id="novel_name" class="text_pole" type="text" placeholder="输入小说名称">
                </div>
                <div class="form-group">
                    <label for="chapter_regex" class="form_label">章节标题正则表达式</label>
                    <input id="chapter_regex" class="text_pole" type="text" value="^\\s*第.*[章卷节]">
                </div>
                <div class="form-group">
                    <label for="api_url" class="form_label">分析API地址</label>
                    <input id="api_url" class="text_pole" type="url" value="http://127.0.0.1:11434">
                </div>
                <div class="form-group">
                    <label for="api_model" class="form_label">分析API模型</label>
                    <input id="api_model" class="text_pole" type="text" value="Qwen/Qwen2.5-32B-Instruct-GGUF/qwen2.5-32b-instruct-q8_0.gguf">
                </div>
                <div class="form-group">
                    <label for="api_prompt" class="form_label">分析提示词</label>
                    <textarea id="api_prompt" class="text_pole" rows="10">请从以下章节文本中提取人物、地点、物品、事件、关系等关键信息，并整理为JSON格式的知识图谱。
要求：
1. entities数组包含提取出的实体，每个实体有name（名称）、type（类型：Character人物/Place地点/Item物品/Event事件）、description（描述）
2. relationships数组包含实体之间的关系，每个关系有from（来源实体名称）、to（目标实体名称）、type（关系类型）、description（关系描述）
3. 只返回JSON，不要返回其他内容
章节文本：
</textarea>
                </div>
            </div>
            <div class="st-modal-footer">
                <button class="menu_button" id="st-save-settings-btn">保存设置</button>
                <button class="menu_button" id="st-cancel-settings-btn">关闭</button>
            </div>
        </div>
    </div>
</div>
