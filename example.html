<div class="novel-writer-extension-root" id="novel-writer-extension-root">
    <!-- 可移动悬浮球 -->
    <div class="float-ball" id="novel-writer-float-ball">
        <span class="ball-icon">📖</span>
        <span class="ball-tip">小说续写</span>
    </div>

    <!-- 主功能面板 -->
    <div class="writer-panel" id="novel-writer-panel">
        <!-- 面板头部 -->
        <div class="panel-header">
            <div class="panel-title">
                <span>📖</span>
                小说续写辅助工具
            </div>
            <button class="panel-close-btn" id="panel-close-btn">✕</button>
        </div>

        <!-- 选项卡导航 -->
        <div class="panel-tab-nav">
            <button class="panel-tab-item active" data-tab="tab-chapter">
                <span>📂</span>
                <span>章节管理</span>
            </button>
            <button class="panel-tab-item" data-tab="tab-graph">
                <span>🧠</span>
                <span>知识图谱</span>
            </button>
            <button class="panel-tab-item" data-tab="tab-write">
                <span>✍️</span>
                <span>续写生成</span>
            </button>
            <button class="panel-tab-item" data-tab="tab-reader">
                <span>📖</span>
                <span>小说阅读</span>
            </button>
        </div>

        <!-- 选项卡内容容器 -->
        <div class="panel-tab-content">
            <!-- 章节管理选项卡 -->
            <div class="panel-tab-panel active" id="tab-chapter">
                <!-- 小说导入模块 -->
                <div class="inline-drawer open" id="drawer-chapter-import">
                    <div class="inline-drawer-header">
                        <b><span>📂</span>小说导入与章节解析</b>
                        <span class="inline-drawer-icon down">▼</span>
                    </div>
                    <div class="inline-drawer-content">
                        <!-- 文件选择区域 -->
                        <div class="file-select-group">
                            <button class="btn btn-primary" id="select-file-btn">
                                <span>📂</span>选择小说TXT文件
                            </button>
                            <span class="file-name" id="file-name-text">未选择文件</span>
                            <input type="file" id="novel-file-upload" accept=".txt" style="display: none;">
                        </div>

                        <!-- 拆分模式切换 -->
                        <div class="form-group">
                            <label class="form-label">章节拆分模式</label>
                            <div class="form-group-inline" style="gap: 20px;">
                                <label class="form-group-inline">
                                    <input type="radio" name="split-mode" value="regex" checked>
                                    <span>正则拆分</span>
                                </label>
                                <label class="form-group-inline">
                                    <input type="radio" name="split-mode" value="wordCount">
                                    <span>按字数拆分</span>
                                </label>
                            </div>
                        </div>

                        <!-- 正则拆分配置 -->
                        <div id="regex-split-group">
                            <div class="grid-row grid-2">
                                <div class="form-group">
                                    <label class="form-label">章节拆分正则预设</label>
                                    <select class="form-select" id="chapter-regex-preset">
                                        <option value="">请选择预设正则</option>
                                        <option value="^\\s*第\\s*[0-9零一二三四五六七八九十百千]+\\s*章.*$">标准章节（第X章）</option>
                                        <option value="^\\s*第\\s*[0-9零一二三四五六七八九十百千]+\\s*卷.*$|^\\s*第\\s*[0-9零一二三四五六七八九十百千]+\\s*章.*$">卷+章节双匹配</option>
                                        <option value="^\\s*第\\s*[0-9零一二三四五六七八九十百千]+\\s*回.*$">古典回体（第X回）</option>
                                        <option value="^\\s*第\\s*[0-9零一二三四五六七八九十百千]+\\s*节.*$">节体格式（第X节）</option>
                                        <option value="^\\s*第\\s*[0-9零一二三四五六七八九十百千]+\\s*话.*$">漫画/轻小说（第X话）</option>
                                        <option value="^\\s*\\d+\\.\\s.*$">数字点开头（1. 标题）</option>
                                        <option value="^\\s*\\d+\\s*$">纯数字章节</option>
                                        <option value="^\\s*番外.*$|^\\s*外传.*$|^\\s*后记.*$|^\\s*前言.*$">番外/外传匹配</option>
                                        <option value="^.*[（(]\\s*[0-9零一二三四五六七八九十百千]+\\s*[）)]\\s*$">括号数字章节（xxx(01)）</option>
                                        <option value="^\\s*[（【]\\s*[0-9零一二三四五六七八九十百千]+\\s*[）】].*$">中文括号章节（【一】xxx）</option>
                                        <option value="^\\s*\\d+、\\s.*$">数字顿号开头（1、标题）</option>
                                        <option value="^.*[-\\s]\\d+\\s*$">短横线数字章节（xxx-01）</option>
                                        <option value="^\\s*Chapter\\s*\\d+.*$">英文Chapter格式</option>
                                        <option value="^\\s*Episode\\s*\\d+.*$">英文Episode格式</option>
                                        <option value="^\\s*Act\\s*\\d+.*$|^\\s*Scene\\s*\\d+.*$">英文Act/Scene格式</option>
                                        <option value="^\\s*【第\\s*[0-9零一二三四五六七八九十百千]+\\s*卷】.*$|^\\s*卷\\s*[0-9零一二三四五六七八九十百千]+.*$">卷名嵌套格式（【第一卷】）</option>
                                        <option value="^\\s*第\\s*[0-9零一二三四五六七八九十百千]+\\s*篇.*$">篇体格式（第X篇）</option>
                                        <option value="^\\s*序章.*$|^\\s*楔子.*$|^\\s*终章.*$|^\\s*尾声.*$">序章/楔子/终章匹配</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">自定义章节拆分正则</label>
                                    <input type="text" class="form-input" id="chapter-regex-input" placeholder="请输入章节拆分正则表达式" value="^\\s*第\\s*[0-9零一二三四五六七八九十百千]+\\s*章.*$">
                                </div>
                            </div>
                        </div>

                        <!-- 按字数拆分配置 -->
                        <div id="wordcount-split-group" style="display: none;">
                            <div class="form-group">
                                <label class="form-label-inline">
                                    <span>单章字数（1000-10000字）</span>
                                    <span class="input-tip">默认3000字</span>
                                </label>
                                <input type="number" class="form-input" id="split-word-count-input" min="1000" max="10000" value="3000">
                            </div>
                        </div>

                        <!-- 最小有效字数配置 -->
                        <div class="form-group">
                            <label class="form-label-inline">
                                <span>图谱生成最小有效章节字数</span>
                                <span class="input-tip">低于此字数无法生成有效图谱，默认200字</span>
                            </label>
                            <input type="number" class="form-input" id="min-word-count-input" min="50" max="5000" value="200">
                        </div>

                        <!-- 解析按钮 -->
                        <div class="btn-group-row btn-center btn-group-wrap">
                            <button class="btn btn-primary btn-lg" id="parse-chapter-btn">解析章节</button>
                            <button class="btn btn-outline" id="select-all-btn">全选</button>
                            <button class="btn btn-outline" id="unselect-all-btn">反选</button>
                        </div>

                        <!-- 发送配置 -->
                        <div class="divider-line"></div>
                        <div class="grid-row grid-2">
                            <div class="form-group">
                                <label class="form-label">发送命令模板</label>
                                <input type="text" class="form-input" id="send-template-input" placeholder="发送命令模板" value="/sendas name={{char}} {{pipe}}">
                            </div>
                            <div class="form-group">
                                <label class="form-label">章节发送间隔（毫秒）</label>
                                <input type="number" class="form-input" id="send-delay-input" min="0" value="100">
                            </div>
                        </div>

                        <!-- 发送按钮 -->
                        <div class="btn-group-row btn-center btn-group-wrap">
                            <button class="btn btn-primary" id="import-selected-btn">导入选中章节</button>
                            <button class="btn btn-secondary" id="import-all-btn">导入全部章节</button>
                            <button class="btn btn-danger" id="stop-send-btn" disabled>停止发送</button>
                        </div>

                        <!-- 发送进度条 -->
                        <div class="progress-wrap">
                            <div class="progress-text" id="novel-import-status"></div>
                            <div class="progress-bar">
                                <div class="progress-fill" id="novel-import-progress"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 章节列表 -->
                <div class="content-card">
                    <div class="card-header">
                        <h4><span>📋</span>章节列表</h4>
                    </div>
                    <div class="chapter-list" id="novel-chapter-list">
                        <p class="empty-tip">请上传小说文件并点击「解析章节」</p>
                    </div>
                </div>
            </div>

            <!-- 知识图谱选项卡 -->
            <div class="panel-tab-panel" id="tab-graph">
                <!-- 图谱生成模块 -->
                <div class="inline-drawer open" id="drawer-graph">
                    <div class="inline-drawer-header">
                        <b><span>🧠</span>章节知识图谱生成</b>
                        <span class="inline-drawer-icon down">▼</span>
                    </div>
                    <div class="inline-drawer-content">
                        <div class="btn-group-row btn-center btn-group-wrap">
                            <button class="btn btn-primary" id="graph-single-btn">生成选中章节图谱</button>
                            <button class="btn btn-secondary" id="graph-batch-btn">生成全部章节图谱</button>
                            <button class="btn btn-outline" id="validate-chapter-graph-btn">检验图谱状态</button>
                        </div>

                        <!-- 生成进度条 -->
                        <div class="progress-wrap">
                            <div class="progress-text" id="graph-generate-status"></div>
                            <div class="progress-bar">
                                <div class="progress-fill" id="graph-progress"></div>
                            </div>
                        </div>

                        <div class="divider-line"></div>
                        <div class="btn-group-row btn-center btn-group-wrap">
                            <button class="btn btn-primary" id="graph-merge-btn">合并全量知识图谱</button>
                            <button class="btn btn-secondary" id="graph-validate-btn">图谱合规性校验</button>
                        </div>

                        <!-- 【新增】单章图谱导入导出按钮 -->
                        <div class="divider-line"></div>
                        <div class="form-group">
                            <label class="form-label">单章节图谱管理（未合并图谱）</label>
                            <div class="btn-group-row btn-center btn-group-wrap">
                                <button class="btn btn-outline" id="single-graph-export-btn">导出单章图谱</button>
                                <button class="btn btn-outline" id="single-graph-import-btn">导入单章图谱</button>
                                <input type="file" id="single-graph-file-upload" accept=".json" style="display: none;">
                            </div>
                        </div>

                        <!-- 合并图谱管理 -->
                        <div class="divider-line"></div>
                        <div class="form-group">
                            <label class="form-label">合并图谱管理</label>
                            <div class="btn-group-row btn-center btn-group-wrap">
                                <button class="btn btn-outline" id="graph-import-btn">导入合并图谱</button>
                                <button class="btn btn-outline" id="graph-export-btn">导出合并图谱</button>
                                <button class="btn btn-outline" id="graph-copy-btn">复制图谱JSON</button>
                                <button class="btn btn-danger" id="graph-clear-btn">清空图谱</button>
                                <input type="file" id="graph-file-upload" accept=".json" style="display: none;">
                            </div>
                        </div>

                        <!-- 合并图谱预览 -->
                        <div class="form-group">
                            <label class="form-label">合并后完整知识图谱</label>
                            <textarea class="form-textarea" id="merged-graph-preview" placeholder="合并后的知识图谱JSON将显示在这里" style="min-height: 200px;" readonly></textarea>
                        </div>

                        <!-- 图谱校验结果 -->
                        <div id="graph-validate-result" style="display: none;">
                            <div class="divider-line"></div>
                            <div class="form-group">
                                <label class="form-label">图谱合规性校验报告</label>
                                <textarea class="form-textarea" id="graph-validate-content" style="min-height: 200px;" readonly></textarea>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 续写生成选项卡 -->
            <div class="panel-tab-panel" id="tab-write">
                <div class="inline-drawer open" id="drawer-write">
                    <div class="inline-drawer-header">
                        <b><span>✍️</span>续写生成配置</b>
                        <span class="inline-drawer-icon down">▼</span>
                    </div>
                    <div class="inline-drawer-content">
                        <!-- 基准章节选择 -->
                        <div class="form-group">
                            <label class="form-label">续写基准章节</label>
                            <select class="form-select" id="write-chapter-select">
                                <option value="">请先解析章节</option>
                            </select>
                        </div>

                        <!-- 基准章节内容 -->
                        <div class="form-group">
                            <label class="form-label-inline">
                                <span>基准章节内容（可魔改）</span>
                                <button class="btn btn-sm btn-outline" id="graph-update-modified-btn">更新魔改内容图谱</button>
                            </label>
                            <textarea class="form-textarea" id="write-chapter-content" placeholder="请先选择基准章节" style="min-height: 150px;" readonly></textarea>
                        </div>

                        <!-- 续写字数配置 -->
                        <div class="grid-row grid-2">
                            <div class="form-group">
                                <label class="form-label">续写目标字数</label>
                                <input type="number" class="form-input" id="write-word-count" min="500" max="10000" value="2000">
                            </div>
                            <div class="form-group">
                                <label class="form-label-inline">
                                    <span>续写质量校验</span>
                                    <label class="form-group-inline">
                                        <input type="checkbox" id="quality-check-switch" checked>
                                        <span>启用</span>
                                    </label>
                                </label>
                                <button class="btn btn-outline" id="precheck-run-btn" style="width: 100%;">执行续写前置校验</button>
                            </div>
                        </div>

                        <!-- 前置校验结果 -->
                        <div class="form-group">
                            <label class="form-label-inline">
                                <span>前置校验状态</span>
                                <span class="status-text status-default" id="precheck-status">未执行</span>
                            </label>
                            <textarea class="form-textarea" id="precheck-report" placeholder="前置校验报告将显示在这里" style="min-height: 100px;" readonly></textarea>
                        </div>

                        <!-- 生成按钮 -->
                        <div class="btn-group-row btn-center btn-group-wrap">
                            <button class="btn btn-primary btn-lg" id="write-generate-btn">生成续写内容</button>
                            <button class="btn btn-danger" id="write-stop-btn" disabled>停止生成</button>
                        </div>

                        <!-- 生成状态 -->
                        <div class="form-group">
                            <div class="status-text" id="write-status"></div>
                        </div>

                        <!-- 续写内容预览 -->
                        <div class="form-group">
                            <label class="form-label">续写内容预览</label>
                            <textarea class="form-textarea" id="write-content-preview" placeholder="生成的续写内容将显示在这里" style="min-height: 200px;"></textarea>
                        </div>

                        <!-- 续写内容操作按钮 -->
                        <div class="btn-group-row btn-center btn-group-wrap">
                            <button class="btn btn-outline" id="write-copy-btn">复制内容</button>
                            <button class="btn btn-outline" id="write-send-btn">发送到对话框</button>
                            <button class="btn btn-danger" id="write-clear-btn">清空内容</button>
                        </div>

                        <!-- 质量校验结果 -->
                        <div id="quality-result-block" style="display: none;">
                            <div class="divider-line"></div>
                            <div class="quality-score">续写质量评分：<span id="quality-score">0</span>/100</div>
                            <textarea class="form-textarea" id="quality-report" style="min-height: 100px;" readonly></textarea>
                        </div>
                    </div>
                </div>

                <!-- 续写链条 -->
                <div class="content-card">
                    <div class="card-header card-header-inline">
                        <h4><span>🔗</span>续写章节链条</h4>
                        <button class="btn btn-sm btn-danger" id="clear-chain-btn">清空全部</button>
                    </div>
                    <div class="chain-container" id="continue-write-chain">
                        <p class="empty-tip">暂无续写章节，生成续写内容后自动添加到此处</p>
                    </div>
                </div>
            </div>

            <!-- 小说阅读选项卡 -->
            <div class="panel-tab-panel" id="tab-reader">
                <!-- 阅读器头部 -->
                <div class="reader-header">
                    <div class="reader-title">
                        <span>📖</span>
                        <span id="reader-current-chapter-title">请先解析章节</span>
                    </div>
                    <div class="reader-controls">
                        <button class="btn btn-sm btn-outline reader-font-btn" id="reader-font-minus">A-</button>
                        <button class="btn btn-sm btn-outline reader-font-btn" id="reader-font-plus">A+</button>
                        <button class="btn btn-sm btn-primary" id="reader-chapter-select-btn">章节列表</button>
                    </div>
                </div>

                <!-- 阅读器内容区域 -->
                <div class="reader-content-wrap">
                    <div class="reader-chapter-drawer" id="reader-chapter-drawer">
                        <div class="reader-drawer-header">
                            <h3><span>📋</span>章节列表</h3>
                            <button class="btn btn-sm btn-outline" id="reader-drawer-close">✕</button>
                        </div>
                        <div class="reader-chapter-count" style="padding: 0 20px; color: var(--novel-text-muted); font-size: 0.85rem;" id="reader-chapter-count">0/0</div>
                        <div class="reader-chapter-list" id="reader-chapter-list">
                            <p class="empty-tip">暂无解析的章节，请先在「章节管理」中解析小说</p>
                        </div>
                    </div>
                    <div class="reader-content" id="reader-content">
                        <p class="reader-empty-tip">请先解析小说章节，然后选择章节开始阅读</p>
                    </div>
                </div>

                <!-- 阅读器底部 -->
                <div class="reader-footer">
                    <button class="btn btn-outline" id="reader-prev-chapter">◀ 上一章</button>
                    <span id="reader-progress-text">0%</span>
                    <div class="reader-progress-bar">
                        <div class="reader-progress-fill" id="reader-progress-fill"></div>
                    </div>
                    <button class="btn btn-outline" id="reader-next-chapter">下一章 ▶</button>
                </div>
            </div>
        </div>
    </div>
</div>
