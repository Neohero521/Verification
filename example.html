<!-- AI小说续写器扩展设置面板 -->
<div class="st-novel-continuation-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>AI小说续写器</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <!-- API配置区域 -->
            <div class="st-novel-continuation_block flex-container">
                <label for="st-novel-api-key">API Key</label>
                <input id="st-novel-api-key" type="password" class="text_pole" placeholder="请输入OpenAI兼容格式的API密钥" />
            </div>
            <div class="st-novel-continuation_block flex-container">
                <label for="st-novel-base-url">API 接口地址</label>
                <input id="st-novel-base-url" type="text" class="text_pole" placeholder="https://api.openai.com/v1" />
            </div>
            <div class="st-novel-continuation_block flex-container">
                <label for="st-novel-model">模型名称</label>
                <input id="st-novel-model" type="text" class="text_pole" placeholder="gpt-3.5-turbo" />
            </div>
            <div class="st-novel-continuation_block flex-container">
                <input id="st-novel-test-connection" class="menu_button" type="submit" value="测试API连接" />
            </div>
            <hr class="sysHR" />

            <!-- 默认续写参数配置 -->
            <div class="st-novel-continuation_block flex-container">
                <label for="st-novel-default-length">默认续写长度</label>
                <select id="st-novel-default-length" class="text_pole">
                    <option value="300">300字</option>
                    <option value="500" selected>500字</option>
                    <option value="800">800字</option>
                    <option value="1000">1000字</option>
                    <option value="2000">2000字</option>
                </select>
            </div>
            <div class="st-novel-continuation_block flex-container">
                <label for="st-novel-default-style">默认续写风格</label>
                <select id="st-novel-default-style" class="text_pole">
                    <option value="默认" selected>保持原文风格</option>
                    <option value="热血">热血爽文</option>
                    <option value="甜宠">甜宠言情</option>
                    <option value="悬疑">悬疑推理</option>
                    <option value="玄幻">玄幻修仙</option>
                    <option value="都市">都市现实</option>
                    <option value="古风">古风言情</option>
                    <option value="科幻">科幻末世</option>
                </select>
            </div>
            <div class="st-novel-continuation_block flex-container">
                <label for="st-novel-default-temperature">内容随机性 (温度值)</label>
                <input id="st-novel-default-temperature" type="range" min="0" max="1" step="0.1" value="0.7" />
                <span id="st-novel-temperature-value" style="margin-left: 8px; min-width: 30px;">0.7</span>
            </div>
            <hr class="sysHR" />

            <!-- 悬浮窗设置 -->
            <div class="st-novel-continuation_block flex-container">
                <input id="st-novel-enable-floatball" type="checkbox" />
                <label for="st-novel-enable-floatball">启用全局悬浮续写球</label>
            </div>
            <div class="st-novel-continuation_block flex-container">
                <div class="justifyLeft">
                    <p class="text-muted">开启后，页面将显示可拖拽悬浮球，选中文本即可一键续写，支持在任意页面使用</p>
                </div>
            </div>
        </div>
    </div>
</div>
