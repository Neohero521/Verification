<!-- 小说续写插件 悬浮框主容器 -->
<div id="novel-writer-float-box" class="novel-writer-extension float-box">
  <!-- 悬浮框头部（可拖动区域） -->
  <div class="float-box-header" id="float-box-header">
    <div class="float-box-title">
      <i class="fa-solid fa-book-open"></i>
      <span>小说智能续写助手</span>
    </div>
    <div class="float-box-controls">
      <button class="float-control-btn" id="float-min-btn" title="最小化">
        <i class="fa-solid fa-minus"></i>
      </button>
      <button class="float-control-btn" id="float-full-btn" title="全屏/还原">
        <i class="fa-solid fa-expand"></i>
      </button>
      <button class="float-control-btn float-close-btn" id="float-close-btn" title="关闭">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>
  </div>

  <!-- 多选项卡导航栏 -->
  <div class="float-tab-nav">
    <button class="float-tab-item active" data-tab="tab-chapter">
      <i class="fa-solid fa-list-ul"></i>
      <span>章节导入与管理</span>
    </button>
    <button class="float-tab-item" data-tab="tab-graph">
      <i class="fa-solid fa-diagram-project"></i>
      <span>知识图谱构建</span>
    </button>
    <button class="float-tab-item" data-tab="tab-write">
      <i class="fa-solid fa-pen-to-square"></i>
      <span>小说续写生成</span>
    </button>
  </div>

  <!-- 选项卡内容容器 -->
  <div class="float-tab-content">
    <!-- 选项卡1：章节导入与管理（原模块1完整保留，全ID不变） -->
    <div class="float-tab-panel active" id="tab-chapter">
      <div class="novel-block">
        <div class="form-group-header">
          <b>小说TXT文件解析</b>
        </div>
        <div class="flex-container gap10 alignCenter flex-wrap">
          <input id="novel-file-upload" type="file" accept=".txt" style="display: none;"/>
          <button class="menu_button menu_button--secondary" id="select-file-btn">
            <i class="fa-solid fa-file-import"></i> 选择小说TXT文件
          </button>
          <span id="file-name-text" class="text-muted">未选择文件</span>
        </div>
      </div>

      <div class="novel-block grid-2">
        <div class="form-group">
          <label class="form-label">章节拆分正则</label>
          <input id="chapter-regex-input" class="form-control w100" type="text" value="^\s*第\s*[0-9零一二三四五六七八九十百千]+\s*章.*$" placeholder="请输入章节匹配正则"/>
        </div>
        <div class="form-group">
          <label class="form-label">发送命令模板</label>
          <input id="send-template-input" class="form-control w100" type="text" value="/sendas name={{char}} {{pipe}}" placeholder="请输入发送命令模板"/>
        </div>
      </div>

      <div class="novel-block grid-2">
        <div class="form-group">
          <label class="form-label">发送间隔(ms)</label>
          <input id="send-delay-input" class="form-control w100" type="number" min="100" max="5000" step="100" value="100"/>
        </div>
        <div class="form-group flex-container alignEnd gap5">
          <input id="parse-chapter-btn" class="menu_button menu_button--primary flex1" type="submit" value="解析章节"/>
          <input id="select-all-btn" class="menu_button menu_button--secondary" type="submit" value="全选"/>
          <input id="unselect-all-btn" class="menu_button menu_button--secondary" type="submit" value="反选"/>
        </div>
      </div>

      <div class="novel-block">
        <div class="flex-container justifySpaceBetween alignCenter">
          <label class="form-label">章节列表（仅显示标题）</label>
          <div class="flex-container gap5">
            <input id="import-selected-btn" class="menu_button menu_button--sm menu_button--primary" type="submit" value="导入选中章节"/>
            <input id="import-all-btn" class="menu_button menu_button--sm menu_button--secondary" type="submit" value="导入全部章节"/>
            <input id="stop-send-btn" class="menu_button menu_button--sm menu_button--danger" type="submit" value="停止发送" disabled/>
          </div>
        </div>
        <p id="novel-import-status" class="text-sm margin0"></p>
        <div class="progress-bar">
          <div id="novel-import-progress" class="progress-fill"></div>
        </div>
        <div id="novel-chapter-list" class="chapter-list margin-t5">
          <p class="text-muted text-center">请上传小说文件并点击「解析章节」</p>
        </div>
      </div>

      <div class="novel-block">
        <label class="form-label">模板示例</label>
        <div class="flex-container gap5 flex-wrap">
          <input type="checkbox" id="example_setting" />
          <label for="example_setting">启用示例配置</label>
          <input id="my_button" class="menu_button menu_button--sm" type="submit" value="测试配置"/>
        </div>
      </div>
    </div>

    <!-- 选项卡2：知识图谱构建与合并（原模块2完整保留，全ID不变） -->
    <div class="float-tab-panel" id="tab-graph">
      <div class="novel-block flex-container justifySpaceBetween alignCenter flex-wrap">
        <b>图谱生成</b>
        <div class="flex-container gap5 flex-wrap">
          <input id="graph-single-btn" class="menu_button menu_button--primary" type="submit" value="生成选中章节图谱"/>
          <input id="graph-batch-btn" class="menu_button menu_button--secondary" type="submit" value="批量生成全章节图谱"/>
        </div>
      </div>
      <div class="novel-block">
        <p id="graph-generate-status" class="text-sm margin0"></p>
        <div class="progress-bar">
          <div id="graph-progress" class="progress-fill"></div>
        </div>
      </div>

      <hr class="sysHR"/>

      <div class="novel-block flex-container justifySpaceBetween alignCenter flex-wrap">
        <b>全量图谱合并</b>
        <input id="graph-merge-btn" class="menu_button menu_button--primary" type="submit" value="合并已生成的章节图谱"/>
      </div>

      <div class="novel-block">
        <label class="form-label">合并后完整知识图谱</label>
        <textarea id="merged-graph-preview" rows="8" class="form-control w100" readonly placeholder="合并后的图谱JSON将显示在这里..." wrap="soft" resize="vertical"></textarea>
        <div class="flex-container gap5 margin-t5 flex-wrap">
          <input id="graph-validate-btn" class="menu_button menu_button--sm" type="submit" value="校验图谱合规性"/>
          <input id="graph-import-btn" class="menu_button menu_button--sm" type="submit" value="导入JSON"/>
          <input id="graph-copy-btn" class="menu_button menu_button--sm" type="submit" value="复制JSON"/>
          <input id="graph-export-btn" class="menu_button menu_button--sm" type="submit" value="导出JSON文件"/>
          <input id="graph-clear-btn" class="menu_button menu_button--sm menu_button--danger" type="submit" value="清空图谱"/>
        </div>
        <input id="graph-file-upload" type="file" accept=".json" style="display: none;"/>
      </div>

      <div class="novel-block" id="graph-validate-result" style="display: none;">
        <label class="form-label">图谱合规性校验结果</label>
        <textarea id="graph-validate-content" rows="3" class="form-control w100" readonly placeholder="校验结果将显示在这里..." wrap="soft"></textarea>
      </div>
    </div>

    <!-- 选项卡3：小说续写生成（原模块3完整保留，全ID不变） -->
    <div class="float-tab-panel" id="tab-write">
      <div class="novel-block flex-container alignCenter gap10 flex-wrap">
        <label for="write-chapter-select" class="form-label margin0">选择续写基准章节</label>
        <select id="write-chapter-select" class="flex1">
          <option value="">请先解析章节</option>
        </select>
      </div>

      <div class="novel-block">
        <div class="flex-container justifySpaceBetween alignCenter flex-wrap">
          <label class="form-label">基准章节内容（可直接编辑修改）</label>
          <input id="graph-update-modified-btn" class="menu_button menu_button--sm menu_button--secondary" type="submit" value="更新魔改章节图谱"/>
        </div>
        <textarea id="write-chapter-content" rows="8" class="form-control w100" placeholder="请先选择上方的基准章节..." readonly wrap="soft" resize="vertical"></textarea>
      </div>

      <!-- 续写前置校验模块（完整保留） -->
      <div class="inline-drawer" id="drawer-precheck">
        <div class="inline-drawer-toggle inline-drawer-header">
          <b>续写前置校验与合规边界</b>
          <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
          <div class="novel-block flex-container justifySpaceBetween">
            <span>前置校验状态：<span id="precheck-status" class="text-muted">未执行</span></span>
            <input id="precheck-run-btn" class="menu_button menu_button--sm menu_button--primary" type="submit" value="执行前置校验"/>
          </div>
          <div class="novel-block">
            <label class="form-label">合规边界与校验报告</label>
            <textarea id="precheck-report" rows="6" class="form-control w100" readonly placeholder="执行前置校验后，将显示人设红线、设定禁区、可呼应伏笔、矛盾预警等内容..." wrap="soft"></textarea>
          </div>
        </div>
      </div>

      <div class="novel-block grid-2">
        <div class="form-group">
          <label for="write-word-count" class="form-label">续写字数</label>
          <div class="flex-container alignCenter gap5">
            <input id="write-word-count" type="number" min="500" max="10000" step="100" class="flex1" value="2000"/>
            <span class="text-muted">范围：500-10000</span>
          </div>
        </div>
        <div class="form-group flex-container alignCenter gap5">
          <label for="quality-check-switch" class="form-label margin0">开启续写质量自动校验</label>
          <input id="quality-check-switch" type="checkbox" checked />
          <span class="text-muted">不合格自动重写</span>
        </div>
      </div>

      <hr class="sysHR"/>

      <div class="novel-block flex-container gap5 flex-wrap">
        <input id="write-generate-btn" class="menu_button menu_button--primary" type="submit" value="生成续写章节"/>
        <input id="write-stop-btn" class="menu_button menu_button--danger" type="submit" value="停止生成" disabled/>
      </div>

      <div class="novel-block">
        <p id="write-status" class="text-sm margin0"></p>
        <div id="quality-result-block" style="display: none;">
          <p class="text-sm margin0">质量评估得分：<span id="quality-score" class="fontBold">0</span>/100</p>
          <textarea id="quality-report" rows="3" class="form-control w100 margin-t5" readonly placeholder="质量评估详细报告将显示在这里..." wrap="soft"></textarea>
        </div>
      </div>

      <hr class="sysHR"/>

      <div class="novel-block">
        <label class="form-label">续写生成结果</label>
        <textarea id="write-content-preview" rows="10" class="form-control w100" placeholder="生成的续写章节内容将显示在这里..." wrap="soft" resize="vertical"></textarea>
        <div class="flex-container gap5 margin-t5 flex-wrap">
          <input id="write-copy-btn" class="menu_button menu_button--sm" type="submit" value="复制内容"/>
          <input id="write-send-btn" class="menu_button menu_button--primary" type="submit" value="发送到对话框"/>
          <input id="write-clear-btn" class="menu_button menu_button--sm menu_button--danger" type="submit" value="清空内容"/>
        </div>
      </div>

      <hr class="sysHR"/>

      <div class="novel-block flex-container justifySpaceBetween alignCenter flex-wrap">
        <b>续写章节链条（可无限叠加续写）</b>
        <div class="flex-container gap5">
          <input id="clear-chain-btn" class="menu_button menu_button--sm menu_button--danger" type="submit" value="清空所有续写章节"/>
        </div>
      </div>
      <div id="continue-write-chain" class="novel-block chain-container">
        <p class="text-muted text-center">暂无续写章节，生成续写内容后自动添加到此处</p>
      </div>
    </div>
  </div>
</div>

<!-- 悬浮框唤起按钮（关闭后显示在页面角落） -->
<button id="float-trigger-btn" class="float-trigger-btn">
  <i class="fa-solid fa-book-open"></i>
</button>
