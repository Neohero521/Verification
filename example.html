<!-- example.html (完整UI代码，适配SillyTavern原生样式，新增逆向分析与质量评估控件) -->
<div class="novel-writer-extension">
    <!-- 模块1：章节导入与管理 -->
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>1. 章节导入与管理</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="novel-block flex-container">
                <label for="novel-file-upload" class="margin-r5">小说TXT文件</label>
                <input id="novel-file-upload" type="file" accept=".txt" class="flex1" />
            </div>
            <div class="novel-block flex-container">
                <label for="chapter-regex-input" class="margin-r5">章节拆分正则</label>
                <input id="chapter-regex-input" type="text" class="flex1" placeholder="^\\s*第\\s*[0-9零一二三四五六七八九十百千]+\\s*章.*$" />
            </div>
            <div class="novel-block flex-container">
                <label for="send-template-input" class="margin-r5">发送命令模板</label>
                <input id="send-template-input" type="text" class="flex1" value="/sendas name={{char}} {{pipe}}" />
            </div>
            <div class="novel-block flex-container">
                <label for="send-delay-input" class="margin-r5">发送间隔(ms)</label>
                <input id="send-delay-input" type="number" min="50" step="10" class="flex1" value="100" />
            </div>
            <div class="novel-block flex-container">
                <input id="parse-chapter-btn" class="menu_button menu_button--primary" type="submit" value="解析章节" />
            </div>
            <hr class="sysHR" />
            <div class="novel-block flex-container justifySpaceBetween">
                <b>章节列表（仅显示标题）</b>
                <div class="flex-container gap5">
                    <input id="select-all-btn" class="menu_button menu_button--sm" type="submit" value="全选" />
                    <input id="unselect-all-btn" class="menu_button menu_button--sm" type="submit" value="全不选" />
                </div>
            </div>
            <div id="novel-chapter-list" class="novel-block chapter-list">
                <p class="text-muted text-center">请上传小说文件并点击「解析章节」</p>
            </div>
            <div class="novel-block">
                <p id="novel-import-status" class="text-sm margin0"></p>
                <div class="progress-bar">
                    <div id="novel-import-progress" class="progress-fill"></div>
                </div>
            </div>
            <hr class="sysHR" />
            <div class="novel-block flex-container gap5">
                <input id="stop-send-btn" class="menu_button menu_button--danger" type="submit" value="停止发送" />
                <input id="import-selected-btn" class="menu_button menu_button--primary" type="submit" value="导入选中章节到对话框" />
                <input id="import-all-btn" class="menu_button menu_button--secondary" type="submit" value="导入全部章节到对话框" />
            </div>
            <hr class="sysHR" />
            <div class="example-extension_block flex-container">
                <input id="my_button" class="menu_button" type="submit" value="示例按钮" />
            </div>
            <div class="example-extension_block flex-container">
                <input id="example_setting" type="checkbox" />
                <label for="example_setting">模板示例复选框</label>
            </div>
        </div>
    </div>

    <!-- 模块2：知识图谱构建与合并（增强版，包含版本追溯与反向依赖） -->
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>2. 知识图谱构建与合并（治理级）</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="novel-block flex-container justifySpaceBetween">
                <b>图谱生成</b>
                <div class="flex-container gap5">
                    <input id="graph-single-btn" class="menu_button menu_button--primary" type="submit" value="生成选中章节图谱" />
                    <input id="graph-batch-btn" class="menu_button menu_button--secondary" type="submit" value="批量生成全章节图谱" />
                </div>
            </div>
            <div class="novel-block">
                <p id="graph-generate-status" class="text-sm margin0"></p>
                <div class="progress-bar">
                    <div id="graph-progress" class="progress-fill"></div>
                </div>
            </div>
            <hr class="sysHR" />
            <div class="novel-block flex-container justifySpaceBetween">
                <b>全量图谱合并（包含反向依赖与质量评估）</b>
                <input id="graph-merge-btn" class="menu_button menu_button--primary" type="submit" value="合并已生成的章节图谱" />
            </div>
            <div class="novel-block">
                <label class="form-label">合并后完整知识图谱（含反向依赖）</label>
                <textarea id="merged-graph-preview" rows="6" class="form-control w100" readonly placeholder="合并后的图谱JSON将显示在这里..."></textarea>
                <div class="flex-container gap5 margin-t5">
                    <input id="graph-import-btn" class="menu_button menu_button--sm" type="submit" value="导入JSON" />
                    <input id="graph-copy-btn" class="menu_button menu_button--sm" type="submit" value="复制JSON" />
                    <input id="graph-export-btn" class="menu_button menu_button--sm" type="submit" value="导出JSON文件" />
                    <input id="graph-clear-btn" class="menu_button menu_button--sm menu_button--danger" type="submit" value="清空图谱" />
                </div>
                <input id="graph-file-upload" type="file" accept=".json" style="display: none;" />
            </div>
        </div>
    </div>

    <!-- 模块3：小说续写生成（包含逆向分析前置校验与质量评估闭环） -->
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>3. 小说续写生成（治理闭环）</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="novel-block flex-container">
                <label for="write-chapter-select" class="margin-r5">选择续写基准章节</label>
                <select id="write-chapter-select" class="flex1">
                    <option value="">请先解析章节</option>
                </select>
            </div>
            <div class="novel-block">
                <label class="form-label">基准章节内容（可编辑，若修改将触发魔改续写）</label>
                <textarea id="write-chapter-content" rows="12" class="form-control w100" placeholder="请先选择上方的基准章节..." readonly></textarea>
            </div>
            <div class="novel-block flex-container">
                <label for="write-word-count" class="margin-r5">续写字数</label>
                <input id="write-word-count" type="number" min="500" max="10000" step="100" class="flex1" value="2000" />
                <span class="margin-l5 text-muted">范围：500-10000</span>
            </div>
            <hr class="sysHR" />
            <!-- 逆向分析前置校验报告 -->
            <div class="novel-block">
                <label class="form-label">前置校验报告（自动生成）</label>
                <textarea id="precheck-report" rows="4" class="form-control w100" readonly placeholder="续写前将自动进行逆向分析..."></textarea>
            </div>
            <div class="novel-block flex-container gap5">
                <input id="write-generate-btn" class="menu_button menu_button--primary" type="submit" value="生成续写（含质量评估）" />
                <input id="write-stop-btn" class="menu_button menu_button--danger" type="submit" value="停止生成" />
            </div>
            <div class="novel-block">
                <p id="write-status" class="text-sm margin0"></p>
            </div>
            <hr class="sysHR" />
            <div class="novel-block">
                <label class="form-label">续写生成结果（质量评估通过后显示）</label>
                <textarea id="write-content-preview" rows="15" class="form-control w100" placeholder="生成的续写章节内容将显示在这里..."></textarea>
                <div class="flex-container gap5 margin-t5">
                    <input id="write-copy-btn" class="menu_button menu_button--sm" type="submit" value="复制内容" />
                    <input id="write-send-btn" class="menu_button menu_button--primary" type="submit" value="发送到对话框" />
                    <input id="write-clear-btn" class="menu_button menu_button--sm menu_button--danger" type="submit" value="清空内容" />
                </div>
            </div>
            <hr class="sysHR" />
            <div class="novel-block flex-container justifySpaceBetween">
                <b>续写章节链条（可无限叠加续写）</b>
                <div class="flex-container gap5">
                    <input id="clear-chain-btn" class="menu_button menu_button--sm menu_button--danger" type="submit" value="清空所有续写章节" />
                </div>
            </div>
            <div id="continue-write-chain" class="novel-block chain-container">
                <p class="text-muted text-center">暂无续写章节，生成续写内容后自动添加到此处</p>
            </div>
        </div>
    </div>
</div>
